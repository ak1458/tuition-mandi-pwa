<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TuitionMandi - Offline</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: system-ui, sans-serif;
        background: #f7f0e3;
        color: #1c1b35;
      }
      .card {
        width: min(420px, 90vw);
        background: #fff;
        border: 1px solid #ede3cc;
        border-radius: 16px;
        padding: 24px;
        box-shadow: 0 12px 30px rgba(28, 27, 53, 0.12);
      }
      h1 {
        margin: 0 0 8px;
        font-size: 24px;
      }
      p {
        margin: 0;
        color: #6b6880;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>You are offline</h1>
      <p>TuitionMandi app shell is available. Reconnect internet to sync attendance and fee updates.</p>
    </div>
  </body>
</html>
