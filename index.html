<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/icons/icon-192.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/icons/icon-192.png" />
    <link rel="alternate icon" href="/favicon.ico" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#1c1b35" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#1c1b35" media="(prefers-color-scheme: dark)" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=5" />
    <meta name="description" content="Takhti — aapka digital register. Trusted local tuition teachers, attendance, fees, and AI progress reports — all in one PWA." />
    <link rel="canonical" href="https://takhti.app/" />
    <link rel="alternate" hreflang="hi" href="https://takhti.app/?lng=hi" />
    <link rel="alternate" hreflang="en" href="https://takhti.app/?lng=en" />
    <link rel="alternate" hreflang="x-default" href="https://takhti.app/" />
    <meta name="robots" content="index, follow, max-image-preview:large" />
    <meta name="format-detection" content="telephone=no" />

    <!-- Open Graph / social preview (static default; /profile/:id overrides via api/og) -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Takhti" />
    <meta property="og:locale" content="hi_IN" />
    <meta property="og:locale:alternate" content="en_IN" />
    <meta property="og:title" content="Takhti — Aapka Digital Register" />
    <meta property="og:description" content="Trusted local tuition teachers, attendance, fees, and AI progress reports — all in one PWA." />
    <meta property="og:url" content="https://takhti.app/" />
    <meta property="og:image" content="https://takhti.app/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Takhti — Aapka Digital Register" />
    <meta name="twitter:description" content="Trusted local tuition teachers, attendance, fees, and AI progress reports — all in one PWA." />
    <meta name="twitter:image" content="https://takhti.app/og-image.png" />

    <!-- PWA Apple Touch Icon for iOS Homescreen icon support -->
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Takhti" />
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- Structured data: Organization + WebSite -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "Takhti",
        "url": "https://takhti.app",
        "logo": "https://takhti.app/icons/icon-512.png",
        "description": "Hyperlocal tuition teacher discovery, attendance, fees and AI progress reports for Indian teachers and parents.",
        "address": {
          "@type": "PostalAddress",
          "addressLocality": "Gonda",
          "addressRegion": "Uttar Pradesh",
          "addressCountry": "IN"
        },
        "contactPoint": [{
          "@type": "ContactPoint",
          "contactType": "customer support",
          "email": "support@takhti.app",
          "availableLanguage": ["en", "hi"]
        }],
        "sameAs": []
      }
    </script>
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "Takhti",
        "url": "https://takhti.app",
        "inLanguage": ["hi", "en"],
        "potentialAction": {
          "@type": "SearchAction",
          "target": "https://takhti.app/search?q={search_term_string}",
          "query-input": "required name=search_term_string"
        }
      }
    </script>

    <!-- Fonts: Inter (body) + Outfit (display headings) for an
         extremely premium, minimal and pure readable editorial look.
         Noto Sans Devanagari for Hindi conjunct rendering.
         Preconnect saves ~250ms on first paint; display=swap prevents
         invisible-text-on-load on slow connections. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@500;600;700;800&family=Noto+Sans+Devanagari:wght@400;500;600;700;800&display=swap"
    />

    <title>Takhti — Aapka Digital Register</title>
  </head>
  <body>
    <noscript>
      <div style="max-width:520px;margin:48px auto;padding:24px;font-family:system-ui,sans-serif;background:#fff;border:1px solid #ede3cc;border-radius:16px;color:#1c1b35;line-height:1.55;">
        <h1 style="margin:0 0 12px;font-size:22px;">Takhti — Aapka Digital Register</h1>
        <p>Takhti is a Progressive Web App that connects parents with trusted local tuition teachers and helps teachers run attendance, fees and progress reports. To use Takhti you need to enable JavaScript in your browser.</p>
        <p style="margin-top:12px;font-weight:600;">
          <a style="color:#4930a8;" href="/help">Help &amp; FAQ</a> &middot;
          <a style="color:#4930a8;" href="/privacy">Privacy Policy</a> &middot;
          <a style="color:#4930a8;" href="/terms">Terms</a> &middot;
          <a style="color:#4930a8;" href="/contact">Contact</a>
        </p>
      </div>
    </noscript>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
